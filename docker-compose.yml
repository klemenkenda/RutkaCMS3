services:
  mysql:
    image: mysql:8.4
    container_name: rutkacms_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: rutkacms
      MYSQL_USER: rutka
      MYSQL_PASSWORD: rutka123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 20

  php:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rutkacms_php
    restart: unless-stopped
    working_dir: /var/www/html
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/var/www/html
    command: php -S 0.0.0.0:8080 -t public
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy

  admin:
    image: node:20-alpine
    container_name: rutkacms_admin
    restart: unless-stopped
    working_dir: /app
    env_file:
      - ./admin/.env.local
    volumes:
      - ./admin:/app
      - admin_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --hostname 0.0.0.0 --port 3000"
    ports:
      - "3000:3000"
    depends_on:
      - php

volumes:
  mysql_data:
  admin_node_modules:
